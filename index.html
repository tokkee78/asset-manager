<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Asset Manager</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 32px;
      background: #f7f7f7;
      color: #222;
    }

    h1, h2 {
      margin-top: 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, select, button {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #666;
    }

    button {
      background: #222;
      color: #fff;
      cursor: pointer;
      border: none;
      min-width: 120px;
    }

    button:hover {
      background: #000;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .button-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .small-button {
      min-width: auto;
      padding: 6px 10px;
      font-size: 13px;
    }

    .secondary-button {
      background: #666;
    }

    .secondary-button:hover {
      background: #444;
    }

    .danger-button {
      background: #b71c1c;
    }

    .danger-button:hover {
      background: #8f1212;
    }

    .success {
      color: #0a7a28;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .error {
      color: #c62828;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .mode-badge {
      display: inline-block;
      margin-left: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eee;
      font-size: 12px;
      vertical-align: middle;
    }

    .edit-mode {
      background: #fff3cd;
      color: #8a6d3b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f0f0f0;
    }

    .number {
      text-align: right;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-note {
      margin-top: 8px;
      color: #666;
      font-size: 13px;
    }

    @media (max-width: 800px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Personal Asset Manager</h1>
    <div class="muted">Asset records loaded from Supabase</div>
  </div>

  <div class="card">
    <h2>Total Asset Value</h2>
    <div id="totalValue" class="summary-value">Loading...</div>
  </div>

  <div class="card">
    <h2>
      <span id="formTitle">Add Asset Record</span>
      <span id="formModeBadge" class="mode-badge" style="display:none;"></span>
    </h2>

    <form id="assetForm">
      <div class="form-group">
        <label for="recordDate">Record Date</label>
        <input type="date" id="recordDate" required />
      </div>

      <div class="form-group">
        <label for="assetCategory">Category</label>
        <select id="assetCategory" required>
          <option value="">Select category</option>
          <option value="Cash">Cash</option>
          <option value="Bank">Bank</option>
          <option value="Securities">Securities</option>
          <option value="Point">Point</option>
          <option value="Mile">Mile</option>
          <option value="Pension">Pension</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="assetName">Asset Name</label>
        <input type="text" id="assetName" placeholder="e.g. Wallet, Japan Post Bank, Rakuten Point" required />
      </div>

      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0" placeholder="e.g. 40000" required />
      </div>

      <div class="form-group">
        <label for="unitPriceJpy">Unit Price (JPY)</label>
        <input type="number" id="unitPriceJpy" step="0.0001" min="0" placeholder="e.g. 1 or 1.5" required />
      </div>

      <div class="form-group">
        <label>Calculated Value (JPY)</label>
        <input type="text" id="calculatedValue" value="" readonly />
      </div>

      <div class="button-row full-width">
        <button type="submit" id="saveButton">Save</button>
        <button type="button" id="clearButton" class="secondary-button">Clear</button>
      </div>

      <div id="formSuccess" class="success full-width"></div>
      <div id="formError" class="error full-width"></div>
    </form>

    <div class="section-note">
      Value (JPY) is calculated as Amount × Unit Price (JPY).
    </div>
  </div>

  <div class="card">
    <h2>Asset List</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Asset Name</th>
          <th>Amount</th>
          <th>Unit Price (JPY)</th>
          <th>Value (JPY)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="assetTableBody"></tbody>
    </table>
    <div id="tableError" class="error"></div>
  </div>

  <script>
    const supabaseUrl = 'https://nowhqyugwptzjdwrknlc.supabase.co';
    const supabaseKey = 'sb_publishable_HkqukxAoPQkaQlUH6hLZEw_rFjbzsy3';

    const { createClient } = supabase;
    const client = createClient(supabaseUrl, supabaseKey);

    const formTitleEl = document.getElementById('formTitle');
    const formModeBadgeEl = document.getElementById('formModeBadge');
    const recordDateEl = document.getElementById('recordDate');
    const assetCategoryEl = document.getElementById('assetCategory');
    const assetNameEl = document.getElementById('assetName');
    const amountEl = document.getElementById('amount');
    const unitPriceJpyEl = document.getElementById('unitPriceJpy');
    const calculatedValueEl = document.getElementById('calculatedValue');
    const assetFormEl = document.getElementById('assetForm');
    const saveButtonEl = document.getElementById('saveButton');
    const clearButtonEl = document.getElementById('clearButton');
    const formSuccessEl = document.getElementById('formSuccess');
    const formErrorEl = document.getElementById('formError');
    const totalValueEl = document.getElementById('totalValue');
    const assetTableBodyEl = document.getElementById('assetTableBody');
    const tableErrorEl = document.getElementById('tableError');

    let editingId = null;
    let assetRows = [];

    function formatNumber(value) {
      if (value === null || value === undefined || value === '') return '';
      return Number(value).toLocaleString();
    }

    function calculateValue() {
      const amount = Number(amountEl.value || 0);
      const unitPrice = Number(unitPriceJpyEl.value || 0);
      const value = amount * unitPrice;
      calculatedValueEl.value = formatNumber(value);
    }

    function setDefaultDateToMonthEnd() {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();
      const lastDay = new Date(year, month + 1, 0);

      const yyyy = lastDay.getFullYear();
      const mm = String(lastDay.getMonth() + 1).padStart(2, '0');
      const dd = String(lastDay.getDate()).padStart(2, '0');

      recordDateEl.value = `${yyyy}-${mm}-${dd}`;
    }

    function clearMessages() {
      formSuccessEl.textContent = '';
      formErrorEl.textContent = '';
      tableErrorEl.textContent = '';
    }

    function setAddMode() {
      editingId = null;
      formTitleEl.textContent = 'Add Asset Record';
      formModeBadgeEl.style.display = 'none';
      formModeBadgeEl.textContent = '';
      formModeBadgeEl.className = 'mode-badge';
      saveButtonEl.textContent = 'Save';
    }

    function setEditMode(row) {
      editingId = row.id;

      formTitleEl.textContent = 'Edit Asset Record';
      formModeBadgeEl.style.display = 'inline-block';
      formModeBadgeEl.textContent = `Editing ID: ${row.id}`;
      formModeBadgeEl.className = 'mode-badge edit-mode';
      saveButtonEl.textContent = 'Update';

      recordDateEl.value = row.record_date ?? '';
      assetCategoryEl.value = row.asset_category ?? '';
      assetNameEl.value = row.asset_name ?? '';
      amountEl.value = row.amount ?? '';
      unitPriceJpyEl.value = row.unit_price_jpy ?? '';
      calculateValue();

      clearMessages();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearForm() {
      setAddMode();
      setDefaultDateToMonthEnd();
      assetCategoryEl.value = '';
      assetNameEl.value = '';
      amountEl.value = '';
      unitPriceJpyEl.value = '';
      calculatedValueEl.value = '';
      clearMessages();
    }

    async function loadAssets() {
      tableErrorEl.textContent = '';
      assetTableBodyEl.innerHTML = '';
      totalValueEl.textContent = 'Loading...';

      const { data, error } = await client
        .from('assets')
        .select('id, record_date, asset_category, asset_name, amount, unit_price_jpy')
        .order('record_date', { ascending: false })
        .order('asset_category', { ascending: true })
        .order('asset_name', { ascending: true });

      if (error) {
        totalValueEl.textContent = '-';
        tableErrorEl.textContent = 'Error loading data: ' + error.message;
        return;
      }

      assetRows = data || [];

      let total = 0;

      assetRows.forEach((row) => {
        const amount = Number(row.amount || 0);
        const unitPrice = Number(row.unit_price_jpy || 0);
        const valueJpy = amount * unitPrice;
        total += valueJpy;

        const tr = document.createElement('tr');

        const editButton = document.createElement('button');
        editButton.type = 'button';
        editButton.textContent = 'Edit';
        editButton.className = 'small-button secondary-button';
        editButton.addEventListener('click', () => {
          setEditMode(row);
        });

        const deleteButton = document.createElement('button');
        deleteButton.type = 'button';
        deleteButton.textContent = 'Delete';
        deleteButton.className = 'small-button danger-button';
        deleteButton.addEventListener('click', async () => {
          await deleteAsset(row.id, row.asset_name);
        });

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'actions';
        actionsDiv.appendChild(editButton);
        actionsDiv.appendChild(deleteButton);

        tr.innerHTML = `
          <td>${row.record_date ?? ''}</td>
          <td>${row.asset_category ?? ''}</td>
          <td>${row.asset_name ?? ''}</td>
          <td class="number">${formatNumber(amount)}</td>
          <td class="number">${formatNumber(unitPrice)}</td>
          <td class="number">${formatNumber(valueJpy)}</td>
        `;

        const actionsTd = document.createElement('td');
        actionsTd.appendChild(actionsDiv);
        tr.appendChild(actionsTd);

        assetTableBodyEl.appendChild(tr);
      });

      totalValueEl.textContent = '¥ ' + formatNumber(total);
    }

    async function saveAssetRecord(event) {
      event.preventDefault();
      clearMessages();

      const record_date = recordDateEl.value;
      const asset_category = assetCategoryEl.value;
      const asset_name = assetNameEl.value.trim();
      const amount = Number(amountEl.value);
      const unit_price_jpy = Number(unitPriceJpyEl.value);

      if (!record_date || !asset_category || !asset_name) {
        formErrorEl.textContent = 'Please fill in Record Date, Category, and Asset Name.';
        return;
      }

      if (Number.isNaN(amount) || Number.isNaN(unit_price_jpy)) {
        formErrorEl.textContent = 'Please enter valid numeric values for Amount and Unit Price.';
        return;
      }

      saveButtonEl.disabled = true;
      saveButtonEl.textContent = editingId === null ? 'Saving...' : 'Updating...';

      const payload = {
        record_date,
        asset_category,
        asset_name,
        amount,
        unit_price_jpy
      };

      let response;

      if (editingId === null) {
        response = await client.from('assets').insert([payload]);
      } else {
        response = await client
          .from('assets')
          .update(payload)
          .eq('id', editingId);
      }

      if (response.error) {
        formErrorEl.textContent = 'Error saving data: ' + response.error.message;
        saveButtonEl.disabled = false;
        saveButtonEl.textContent = editingId === null ? 'Save' : 'Update';
        return;
      }

      formSuccessEl.textContent = editingId === null
        ? 'Saved successfully.'
        : 'Updated successfully.';

      saveButtonEl.disabled = false;
      saveButtonEl.textContent = editingId === null ? 'Save' : 'Update';

      clearForm();
      await loadAssets();
    }

    async function deleteAsset(id, assetName) {
      clearMessages();

      const confirmed = window.confirm(`Delete this record?\n\nAsset Name: ${assetName}\nID: ${id}`);
      if (!confirmed) return;

      const { error } = await client
        .from('assets')
        .delete()
        .eq('id', id);

      if (error) {
        tableErrorEl.textContent = 'Error deleting data: ' + error.message;
        return;
      }

      if (editingId === id) {
        clearForm();
      }

      formSuccessEl.textContent = 'Deleted successfully.';
      await loadAssets();
    }

    amountEl.addEventListener('input', calculateValue);
    unitPriceJpyEl.addEventListener('input', calculateValue);
    assetFormEl.addEventListener('submit', saveAssetRecord);
    clearButtonEl.addEventListener('click', clearForm);

    clearForm();
    loadAssets();
  </script>
</body>
</html>
