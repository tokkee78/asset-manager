<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Asset Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>💰</text></svg>">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 32px;
      background: #f7f7f7;
      color: #222;
    }

    h1, h2 {
      margin-top: 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .summary-value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    .muted, .section-note {
      color: #666;
      font-size: 14px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, select, button {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      background: #222;
      color: #fff;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #000;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .secondary-button {
      background: #666;
    }

    .secondary-button:hover {
      background: #444;
    }

    .danger-button {
      background: #b71c1c;
    }

    .danger-button:hover {
      background: #8f1212;
    }

    .small-button {
      padding: 6px 10px;
      font-size: 13px;
      min-width: auto;
    }

    .button-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .success {
      color: #0a7a28;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .error {
      color: #c62828;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .mode-badge {
      display: inline-block;
      margin-left: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff3cd;
      color: #8a6d3b;
      font-size: 12px;
      vertical-align: middle;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f0f0f0;
    }

    .number {
      text-align: right;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .selected-row {
      background: #eef6ff;
    }

    .empty-message {
      color: #666;
      font-style: italic;
      padding-top: 12px;
    }

    .hidden {
      display: none;
    }

    .auth-user {
      font-weight: bold;
    }

    @media (max-width: 800px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>
      Personal Asset Manager
      <span style="font-size:16px; font-weight:normal; color:#666; margin-left:12px;">
        v1.2.1
      </span>
    </h1>
    <div class="muted">Asset records loaded from Supabase</div>
  </div>

  <!-- Auth Area -->
  <div class="card">
    <h2>Authentication</h2>

    <div id="loggedOutArea">
      <div class="form-group" style="max-width: 420px;">
        <label for="emailInput">Email Address</label>
        <input type="email" id="emailInput" placeholder="your-email@example.com" />
      </div>

      <div class="button-row" style="margin-top: 16px;">
